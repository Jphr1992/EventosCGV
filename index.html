<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido — EventosCGV</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 28px 24px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 2rem; margin-bottom: 8px; }
    h1 { color: #1a1a2e; font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.88rem; margin-bottom: 20px; }
    .form-wrap { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    iframe { width: 100%; height: 560px; border: none; display: block; }
    .acceso-box {
      margin-top: 20px;
      padding: 16px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .estado {
      font-size: 0.85rem;
      color: #e07b00;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .estado.ok { color: #107c41; font-weight: 600; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #e07b00; flex-shrink: 0; }
    .dot.ok { background: #107c41; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      background: #cbd5e1;
      color: #94a3b8;
      cursor: not-allowed;
      pointer-events: none;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
      text-decoration: none;
    }
    .btn.activo {
      background: #107c41;
      color: white;
      cursor: pointer;
      pointer-events: all;
      box-shadow: 0 4px 14px rgba(16,124,65,0.35);
    }
    .btn.activo:hover { background: #0a5c30; }
    .footer { font-size: 0.75rem; color: #aaa; margin-top: 16px; }
    .manual-wrap { display: none; margin-top: 10px; }
    .manual-wrap.visible { display: block; }
    .btn-manual {
      font-size: 0.78rem;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📶</div>
    <h1>Bienvenido a EventosCGV</h1>
    <p class="subtitle">Completa tu registro para acceder a internet. Solo toma un momento.</p>

    <div class="form-wrap">
      <iframe
        id="miForm"
        src="https://forms.office.com/Pages/ResponsePage.aspx?id=XXi46T4yNE21YS7C_h8W73M_62pgFixPu7DXrTIFNHFUNDFRNks0VkREVVpVWFVZUzBTRTU3NUkwOS4u"
        title="Registro de visitantes"
      ></iframe>
    </div>

    <div class="acceso-box">
      <div class="estado" id="estadoMsg">
        <span class="dot" id="dot"></span>
        <span id="estadoTxt">Completa el formulario para habilitar el acceso</span>
      </div>
      <a class="btn" id="btnAcceso" href="#">Acceder a internet</a>

      <div class="manual-wrap" id="manualWrap">
        <button class="btn-manual" onclick="habilitarBoton()">
          Ya envié el formulario — habilitar acceso manualmente
        </button>
      </div>
    </div>

    <p class="footer">Tu información es confidencial y solo se usará para este evento.</p>
  </div>

  <script>
    const btn    = document.getElementById('btnAcceso');
    const msg    = document.getElementById('estadoMsg');
    const txt    = document.getElementById('estadoTxt');
    const iframe = document.getElementById('miForm');
    let desbloqueado = false;

    function habilitarBoton() {
      if (desbloqueado) return;
      desbloqueado = true;
      clearInterval(detector);
      btn.classList.add('activo');
      btn.href = 'http://www.msftconnecttest.com/redirect';
      txt.textContent = 'Registro completado — ya puedes acceder';
      msg.classList.add('ok');
      document.getElementById('dot').classList.add('ok');
      document.getElementById('manualWrap').classList.remove('visible');
    }

    // Método 1: postMessage desde Microsoft Forms
    window.addEventListener('message', function(e) {
      if (!e.origin) return;
      if (e.origin.includes('microsoft.com') || e.origin.includes('office.com')) {
        habilitarBoton();
      }
    });

    // Método 2: polling cada segundo — intenta leer el texto del iframe
    const detector = setInterval(function() {
      try {
        const iframeDoc = iframe.contentWindow.document;
        const bodyText  = iframeDoc.body ? iframeDoc.body.innerText : '';
        const titleText = iframeDoc.title || '';
        const textoCompleto = (bodyText + ' ' + titleText).toLowerCase();

        const palabras = [
          'respuesta se ha enviado',
          'response was submitted',
          'gracias',
          'thank you',
          'enviado',
          'submitted'
        ];

        if (palabras.some(p => textoCompleto.includes(p))) {
          habilitarBoton();
        }
      } catch(e) {
        // Cross-origin bloqueado — el método 1 cubre este caso
      }
    }, 1000);

    // Método 3: botón manual de respaldo tras 90 segundos
    setTimeout(function() {
      if (!desbloqueado) {
        document.getElementById('manualWrap').classList.add('visible');
      }
    }, 90000);
  </script>
</body>
</html>
