<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido — Evento Ventas 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    h1 { color: #1a1a2e; font-size: 1.5rem; margin-bottom: 8px; }
    p  { color: #555; font-size: 0.95rem; margin-bottom: 24px; }
    iframe {
      width: 100%;
      height: 520px;
      border: none;
      border-radius: 8px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 32px;
      background: #0078d4;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
    }
    .btn:hover { background: #005fa3; }
    .note { font-size: 0.8rem; color: #888; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📶 Bienvenido al Evento de Ventas</h1>
    <p>Regístrate para acceder a internet. Solo toma un momento.</p>

    <!-- 👇 Sustituye esta URL por la de tu Microsoft Form -->
    <iframe width="640px" height="480px" src="https://forms.office.com/Pages/ResponsePage.aspx?id=XXi46T4yNE21YS7C_h8W73M_62pgFixPu7DXrTIFNHFUNDFRNks0VkREVVpVWFVZUzBTRTU3NUkwOS4u&embed=true" frameborder="0" marginwidth="0" marginheight="0" style="border: none; max-width:100%; max-height:100vh" allowfullscreen webkitallowfullscreen mozallowfullscreen msallowfullscreen> </iframe>

    <!-- 👇 Este botón libera el acceso — Meraki redirige aquí después del click-through -->
    <a class="btn" href="http://www.msftconnecttest.com/redirect">
      ✅ Ya me registré — Acceder a internet
    </a>
    <p class="note">Al hacer clic confirmas que completaste el registro.</p>
  </div>
</body>
</html>
